name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: self-hosted

    env:
      PGUSER: dbdb_user
      PGPASSWORD: testpassword
      PGHOST: localhost
      PGPORT: "5432"
      SECRET_KEY: ci-secret-key-not-used-in-production
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "latest"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 postgresql

      - name: Setup PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='dbdb_user'" \
            | grep -q 1 \
            || sudo -u postgres psql -c "CREATE USER dbdb_user WITH PASSWORD 'testpassword' CREATEDB;"
          sudo -u postgres psql -c "ALTER USER dbdb_user WITH PASSWORD 'testpassword';"

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run python manage.py migrate --settings=dbdb.test_settings

      - name: Setup static files
        run: uv run python manage.py --settings=dbdb.test_settings collectstatic --no-input

      - name: Run tests
        run: timeout 60 uv run python manage.py test dbdb.core --settings=dbdb.test_settings --verbosity=2
