name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: self-hosted

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: dbdb_user
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGUSER: dbdb_user
      PGPASSWORD: testpassword
      PGHOST: localhost
      PGPORT: "5432"
      SECRET_KEY: ci-secret-key-not-used-in-production
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "latest"

      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run python manage.py migrate --settings=dbdb.test_settings

      - name: Setup static files
        run: uv run python manage.py --settings=dbdb.test_settings collectstatic --no-input

      - name: Run tests
        run: timeout 60 uv run python manage.py test dbdb.core --settings=dbdb.test_settings --verbosity=2
