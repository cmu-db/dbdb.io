<div class="entry-foot pt-3 mt-3">
  {% if ver %}<span class="entry-revision">Revision <span class="ver-tag">#{{ ver }}</span></span>{% endif %}
  <span class="entry-timestamp">
    {% if url %}<a href="{{ url }}" class="text-accent"{% if title %} title="{{ title }}"{% endif %}>{% endif %}
    <i class="fa-solid fa-clock-rotate-left"></i>Last Updated: <time datetime="{{ timestamp|date:'c' }}">{{ timestamp|date:datetime_format }}</time>
    {% if url %}</a>{% endif %}
  </span>
</div>
