{% load static %}
{% load thumbnail %}

<a href="{{ item.get_absolute_url }}" class="db-row">
    <span class="rank">{{ forloop.counter|stringformat:"02d" }}</span>
    <span class="mono-tile">
        {% if item.current.logo %}
        <img style="width:100%;height:100%;object-fit:contain;" loading="lazy"
             src="{% if item.current.logo.url|lower|slice:"-3:" == "svg" %}{{ item.current.logo.url }}{% else %}{{ item.current.logo|thumbnail_url:'thumb' }}{% endif %}"
             alt="{{ item.name }}">
        {% else %}
        {{ item.name|first|upper }}
        {% endif %}
    </span>
    <span class="db-info">
        <span class="db-name">{{ item.name }}</span>
        {% if item.data_model_str %}<span class="db-model">{{ item.data_model_str }}</span>{% endif %}
    </span>
    {% if item.metric %}<span class="db-metric">{{ item.metric }}</span>{% endif %}
</a>
